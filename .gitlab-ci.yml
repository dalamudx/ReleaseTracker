stages:
  - build
  - trigger

variables:
  IMAGE_TAG: $JFROG_REGISTRY/releasetracker:dev

docker-build:
  stage: build
  image:
    name: $JFROG_REGISTRY/kaniko-project/executor:v1.24.0-debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${JFROG_REGISTRY}\":{\"auth\":\"$(echo -n "${JFROG_USER}:${JFROG_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${IMAGE_TAG}"
      --skip-tls-verify
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
      exists:
        - Dockerfile

trigger_jenkins:
  stage: trigger
  image: $JFROG_REGISTRY/curlimages/curl
  rules:
    - if: '($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master") && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
  script:
    - echo "GitLab pipeline succeeded, triggering Jenkins..."
    - |
      curl -X POST "https://$JENKINS_URL/generic-webhook-trigger/invoke?token=$JENKINS_TOKEN" \
      --header "Content-Type: application/json" \
      --data "{\"image_tag\":\"${IMAGE_TAG}\", \"project_name\":\"releasetracker\"}"