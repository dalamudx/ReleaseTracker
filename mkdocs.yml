site_name: ReleaseTracker
site_description: 轻量级、可配置的版本追踪与更新编排工具
site_author: dalamudx
site_url: https://dalamudx.github.io/ReleaseTracker/
repo_name: dalamudx/ReleaseTracker
repo_url: https://github.com/dalamudx/ReleaseTracker
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: zh
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到浅色模式
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            首页: Home
            快速开始: Getting Started
            安装部署: Installation
            配置说明: Configuration
            配置与功能: Configuration & Features
            已知限制: Known Limitations

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 首页: index.md
  - 快速开始:
      - 安装部署: getting-started/installation.md
  - 配置说明:
      - 配置与功能: configuration/flow.md
  - 已知限制: limitations.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dalamudx/ReleaseTracker
