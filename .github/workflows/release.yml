name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
      - backend/pyproject.toml
      - frontend/package.json
      - frontend/package-lock.json
  workflow_dispatch:
    inputs:
      tag_latest:
        description: 'Whether to tag as latest and version tags from VERSION'
        required: false
        type: boolean
        default: true
      tag_dev:
        description: 'Whether to tag as dev'
        required: false
        type: boolean
        default: false
      custom_tag:
        description: 'Custom tag (optional)'
        required: false
        default: ''
      use_cache:
        description: 'Whether to use Docker build cache'
        required: false
        type: boolean
        default: true
      publish_release:
        description: 'Whether to publish GitHub Release after a successful build'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate "https://github.com/amacneil/dbmate/releases/download/v2.32.0/dbmate-linux-amd64"
          chmod +x /usr/local/bin/dbmate

      - name: Run backend tests
        run: uv --directory backend run --extra dev pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend tests
        run: npm --prefix frontend run test

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Convert image name to lowercase
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "📦 Image name: ${{ env.REGISTRY }}/$IMAGE_NAME"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Read project version
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if ! echo "$VERSION" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Invalid VERSION value: $VERSION" >&2
            exit 1
          fi

          VERSION=${VERSION#v}
          IMAGE_VERSION=${VERSION//+/-}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          TAG="v$VERSION"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_version=$IMAGE_VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "✅ Read project version: $VERSION (image tag: $IMAGE_VERSION, release tag: $TAG)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: meta
        run: |
          TAGS=""
          RELEASE_BUILD="${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.publish_release == 'true' }}"

          if [ "$RELEASE_BUILD" = "true" ] || [ "${{ github.event.inputs.tag_latest }}" = "true" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest"
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.image_version }}"
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.minor }}"
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.major }}"
          fi

          if [ "$RELEASE_BUILD" != "true" ] && [ "${{ github.event.inputs.tag_dev }}" = "true" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:dev"
          fi

          if [ -n "${{ github.event.inputs.custom_tag }}" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.event.inputs.custom_tag }}"
          fi

          TAGS=$(echo "$TAGS" | sed 's/^,//')
          if [ -z "$TAGS" ]; then
            echo "No Docker tags were generated. Enable tag_latest, tag_dev, or provide custom_tag." >&2
            exit 1
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "🏷️  Generated tags: $TAGS"

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: ${{ (github.event_name == 'push' || github.event.inputs.use_cache == 'true') && 'type=gha' || '' }}
          cache-to: ${{ (github.event_name == 'push' || github.event.inputs.use_cache == 'true') && 'type=gha,mode=max' || '' }}

      - name: Output build information
        run: |
          echo "### 🎉 Build completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check existing GitHub Release
        id: existing_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists; skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.existing_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.build.outputs.tag }}" \
            --title "Release ${{ needs.build.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --generate-notes

      - name: Output release information
        run: |
          echo "### GitHub Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ needs.build.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** ${{ needs.build.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Created:** ${{ steps.existing_release.outputs.exists != 'true' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ needs.build.outputs.tags }}" | tr ',' '\n' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
