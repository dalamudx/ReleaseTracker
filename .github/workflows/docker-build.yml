name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      tag_latest:
        description: 'Whether to tag as latest (also extracts and applies version tags)'
        required: false
        type: boolean
        default: false
      tag_dev:
        description: 'Whether to tag as dev'
        required: false
        type: boolean
        default: true
      custom_tag:
        description: 'Custom tag (optional)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Convert image name to lowercase
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "📦 Image name: ${{ env.REGISTRY }}/$IMAGE_NAME"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version number
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          # Try to extract the version number from the branch name (supports 2.1.1 or release/2.1.1 formats)
          VERSION=$(echo "$BRANCH" | grep -oP '\d+\.\d+\.\d+' || echo "")
          
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            # Extract major and minor versions
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f1-2)
            echo "major=$MAJOR" >> $GITHUB_OUTPUT
            echo "minor=$MINOR" >> $GITHUB_OUTPUT
            echo "✅ Extracted version number: $VERSION (major: $MAJOR, minor: $MINOR)"
          else
            echo "version=" >> $GITHUB_OUTPUT
            echo "major=" >> $GITHUB_OUTPUT
            echo "minor=" >> $GITHUB_OUTPUT
            echo "⚠️  Failed to extract a version number from the branch name"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: meta
        run: |
          TAGS=""
          
          # tag_latest: add latest and version tags
          if [ "${{ github.event.inputs.tag_latest }}" == "true" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest"
            
            if [ -n "${{ steps.version.outputs.version }}" ]; then
              TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}"
              TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.minor }}"
              TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.major }}"
            fi
          fi
          
          # tag_dev: add the dev tag
          if [ "${{ github.event.inputs.tag_dev }}" == "true" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:dev"
          fi
          
          # custom_tag: add the custom tag
          if [ -n "${{ github.event.inputs.custom_tag }}" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.event.inputs.custom_tag }}"
          fi
          
          # Remove the leading comma
          TAGS=$(echo "$TAGS" | sed 's/^,//')
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "🏷️  Generated tags: $TAGS"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output build information
        run: |
          echo "### 🎉 Build completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version || 'Not extracted' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
