name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      tag_latest:
        description: 'Whether to tag as latest and version tags from VERSION'
        required: false
        type: boolean
        default: false
      tag_dev:
        description: 'Whether to tag as dev'
        required: false
        type: boolean
        default: true
      custom_tag:
        description: 'Custom tag (optional)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate "https://github.com/amacneil/dbmate/releases/download/v2.32.0/dbmate-linux-amd64"
          chmod +x /usr/local/bin/dbmate

      - name: Run backend tests
        run: uv --directory backend run --extra dev pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend tests
        run: npm --prefix frontend run test

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:

      - name: Convert image name to lowercase
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "📦 Image name: ${{ env.REGISTRY }}/$IMAGE_NAME"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if ! echo "$VERSION" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Invalid VERSION value: $VERSION" >&2
            exit 1
          fi

          VERSION=${VERSION#v}
          IMAGE_VERSION=${VERSION//+/-}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image_version=$IMAGE_VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "✅ Read project version: $VERSION (image tag: $IMAGE_VERSION, major: $MAJOR, minor: $MINOR)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: meta
        run: |
          TAGS=""
          
          # tag_latest: add latest and version tags
          if [ "${{ github.event.inputs.tag_latest }}" == "true" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest"
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.image_version }}"
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.minor }}"
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.major }}"
          fi
          
          # tag_dev: add the dev tag
          if [ "${{ github.event.inputs.tag_dev }}" == "true" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:dev"
          fi
          
          # custom_tag: add the custom tag
          if [ -n "${{ github.event.inputs.custom_tag }}" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.event.inputs.custom_tag }}"
          fi
          
          # Remove the leading comma
          TAGS=$(echo "$TAGS" | sed 's/^,//')
          if [ -z "$TAGS" ]; then
            echo "No Docker tags were generated. Enable tag_latest, tag_dev, or provide custom_tag." >&2
            exit 1
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "🏷️  Generated tags: $TAGS"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output build information
        run: |
          echo "### 🎉 Build completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
